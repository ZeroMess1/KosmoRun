name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & NDK
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"

      - name: Download Godot 4.2.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          unzip -q Godot_v4.2.2-stable_export_templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore $HOME/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Set up Godot Android settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "$HOME/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Write export_presets.cfg
        run: |
          mkdir -p build
          cat > export_presets.cfg << EOF
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/CyberRunner.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          keystore/debug="$HOME/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          package/unique_name="com.cyberrunner.game"
          package/name="Cyber Runner"
          package/signed=true
          package/app_category=Game
          screen/immersive_mode=true
          screen/keep_screen_on=true
          version/code=1
          version/name="1.0"
          permissions/vibrate=false
          permissions/internet=false
          EOF

      - name: Import project
        run: |
          timeout 30 godot --headless --editor --quit 2>&1 || true
          sleep 3

      - name: Export APK
        run: |
          godot --headless --export-debug "Android" build/CyberRunner.apk 2>&1
          ls -la build/ || echo "build/ not found"
          find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberRunner-APK
          path: build/CyberRunner.apk
          if-no-files-found: error
          retention-days: 30
