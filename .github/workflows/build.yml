name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & NDK
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"

      - name: Download Godot 4.2.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          unzip -q Godot_v4.2.2-stable_export_templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore $HOME/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Write Godot editor settings (no indentation!)
        run: |
          mkdir -p ~/.config/godot
          KEYSTORE_PATH="$HOME/debug.keystore"
          SDK_PATH="$ANDROID_SDK_ROOT"
          printf '[gd_resource type="EditorSettings" format=3]\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\nexport/android/force_system_user = false\nexport/android/shutdown_adb_on_exit = true\n' "$SDK_PATH" "$KEYSTORE_PATH" > ~/.config/godot/editor_settings-4.tres
          echo "--- Editor settings ---"
          cat ~/.config/godot/editor_settings-4.tres

      - name: Write export_presets.cfg (no indentation!)
        run: |
          mkdir -p build
          KEYSTORE_PATH="$HOME/debug.keystore"
          printf '[preset.0]\n\nname="Android"\nplatform="Android"\nrunnable=true\ndedicated_server=false\ncustom_features=""\nexport_filter="all_resources"\ninclude_filter=""\nexclude_filter=""\nexport_path="build/CyberRunner.apk"\nencrypt_pck=false\nencrypt_directory=false\n\n[preset.0.options]\n\ncustom_template/debug=""\ncustom_template/release=""\ngradle_build/use_gradle_build=false\narchitectures/armeabi-v7a=true\narchitectures/arm64-v8a=true\nkeystore/debug="%s"\nkeystore/debug_user="androiddebugkey"\nkeystore/debug_password="android"\nkeystore/release=""\nkeystore/release_user=""\nkeystore/release_password=""\npackage/unique_name="com.cyberrunner.game"\npackage/name="Cyber Runner"\npackage/signed=true\npackage/app_category=0\nscreen/immersive_mode=true\nscreen/keep_screen_on=true\nversion/code=1\nversion/name="1.0"\n' "$KEYSTORE_PATH" > export_presets.cfg
          echo "--- Export presets ---"
          cat export_presets.cfg

      - name: Import project
        run: |
          timeout 60 godot --headless --editor --quit 2>&1 || true
          sleep 5

      - name: Check SDK and templates
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/ndk/ || echo "NDK not found"
          ls ~/.local/share/godot/export_templates/4.2.2.stable/ | head -5

      - name: Export APK
        run: |
          godot --headless --export-debug "Android" build/CyberRunner.apk 2>&1
          echo "--- Files in build/ ---"
          ls -la build/ || echo "build/ not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberRunner-APK
          path: build/CyberRunner.apk
          if-no-files-found: error
          retention-days: 30
