name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore /home/runner/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Export Godot Android APK
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz"
          relative_project_path: "./"
          archive_output: false
          export_debug: true
          android_sign_debug: true
          android_keystore_debug_path: "/home/runner/debug.keystore"
          android_keystore_debug_user: "androiddebugkey"
          android_keystore_debug_password: "android"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberRunner-APK
          path: /home/runner/.local/share/godot/builds/Android/
          retention-days: 30
