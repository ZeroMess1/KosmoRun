name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"

      - name: Download Godot 4.2.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          mv Godot_v4.2.2-stable_linux.x86_64 godot
          chmod +x godot

      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          unzip -q Godot_v4.2.2-stable_export_templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Write export_presets.cfg
        run: |
          mkdir -p build
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          export_path="build/CyberRunner.apk"

          [preset.0.options]
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          keystore/debug="debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          package/unique_name="com.cyberrunner.game"
          package/name="Cyber Runner"
          package/signed=true
          screen/immersive_mode=true
          screen/keep_screen_on=true
          EOF

      - name: Export APK
        run: |
          ./godot --headless --export-debug "Android" build/CyberRunner.apk || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberRunner-APK
          path: build/CyberRunner.apk
          retention-days: 30
