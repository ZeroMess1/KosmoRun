name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & NDK
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"

      - name: Download Godot 4.2.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          unzip -q Godot_v4.2.2-stable_export_templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore $HOME/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Debug - show all paths
        run: |
          echo "=== ANDROID_SDK_ROOT ==="
          echo $ANDROID_SDK_ROOT
          echo "=== NDK versions ==="
          ls $ANDROID_SDK_ROOT/ndk/ 2>/dev/null || echo "NDK folder missing"
          echo "=== Build tools ==="
          ls $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "Build tools missing"
          echo "=== Keystore ==="
          ls -la $HOME/debug.keystore 2>/dev/null || echo "Keystore missing"
          echo "=== Godot templates ==="
          ls ~/.local/share/godot/export_templates/4.2.2.stable/ 2>/dev/null | grep android || echo "Android templates missing"

      - name: Write editor settings
        run: |
          mkdir -p ~/.config/godot
          SDK="$ANDROID_SDK_ROOT"
          KS="$HOME/debug.keystore"
          cat > ~/.config/godot/editor_settings-4.tres << SETTINGS
[gd_resource type="EditorSettings" format=3]

[resource]
export/android/android_sdk_path = "$SDK"
export/android/debug_keystore = "$KS"
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
SETTINGS
          echo "=== Editor settings content ==="
          cat ~/.config/godot/editor_settings-4.tres

      - name: Write export_presets.cfg
        run: |
          mkdir -p build
          KS="$HOME/debug.keystore"
          cat > export_presets.cfg << PRESETS
[preset.0]

name="Android"
platform="Android"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="build/CyberRunner.apk"
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

custom_template/debug=""
custom_template/release=""
gradle_build/use_gradle_build=false
architectures/armeabi-v7a=true
architectures/arm64-v8a=true
keystore/debug="$KS"
keystore/debug_user="androiddebugkey"
keystore/debug_password="android"
keystore/release=""
keystore/release_user=""
keystore/release_password=""
package/unique_name="com.cyberrunner.game"
package/name="Cyber Runner"
package/signed=true
package/app_category=0
screen/immersive_mode=true
screen/keep_screen_on=true
version/code=1
version/name="1.0"
PRESETS
          echo "=== export_presets.cfg content ==="
          cat export_presets.cfg

      - name: Import project
        run: |
          timeout 60 godot --headless --editor --quit --verbose 2>&1 || true
          sleep 5

      - name: Export APK verbose
        run: |
          godot --headless --verbose --export-debug "Android" build/CyberRunner.apk 2>&1
          ls -la build/ || echo "build/ empty"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberRunner-APK
          path: build/CyberRunner.apk
          if-no-files-found: warn
          retention-days: 30
