name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and NDK
        run: sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"

      - name: Download Godot 4.2.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          mv Godot_v4.2.2-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Download Export Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          unzip -q Godot_v4.2.2-stable_export_templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore $HOME/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Write editor settings
        run: |
          mkdir -p ~/.config/godot
          echo "[gd_resource type=\"EditorSettings\" format=3]" > ~/.config/godot/editor_settings-4.tres
          echo "" >> ~/.config/godot/editor_settings-4.tres
          echo "[resource]" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/android_sdk_path = \"$ANDROID_SDK_ROOT\"" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/debug_keystore = \"$HOME/debug.keystore\"" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/debug_keystore_user = \"androiddebugkey\"" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/debug_keystore_pass = \"android\"" >> ~/.config/godot/editor_settings-4.tres
          cat ~/.config/godot/editor_settings-4.tres

      - name: Write export_presets.cfg
        run: |
          mkdir -p build
          echo "[preset.0]" > export_presets.cfg
          echo "" >> export_presets.cfg
          echo "name=\"Android\"" >> export_presets.cfg
          echo "platform=\"Android\"" >> export_presets.cfg
          echo "runnable=true" >> export_presets.cfg
          echo "dedicated_server=false" >> export_presets.cfg
          echo "custom_features=\"\"" >> export_presets.cfg
          echo "export_filter=\"all_resources\"" >> export_presets.cfg
          echo "include_filter=\"\"" >> export_presets.cfg
          echo "exclude_filter=\"\"" >> export_presets.cfg
          echo "export_path=\"build/CyberRunner.apk\"" >> export_presets.cfg
          echo "encrypt_pck=false" >> export_presets.cfg
          echo "encrypt_directory=false" >> export_presets.cfg
          echo "" >> export_presets.cfg
          echo "[preset.0.options]" >> export_presets.cfg
          echo "" >> export_presets.cfg
          echo "gradle_build/use_gradle_build=false" >> export_presets.cfg
          echo "architectures/armeabi-v7a=true" >> export_presets.cfg
          echo "architectures/arm64-v8a=true" >> export_presets.cfg
          echo "keystore/debug=\"$HOME/debug.keystore\"" >> export_presets.cfg
          echo "keystore/debug_user=\"androiddebugkey\"" >> export_presets.cfg
          echo "keystore/debug_password=\"android\"" >> export_presets.cfg
          echo "keystore/release=\"\"" >> export_presets.cfg
          echo "keystore/release_user=\"\"" >> export_presets.cfg
          echo "keystore/release_password=\"\"" >> export_presets.cfg
          echo "package/unique_name=\"com.cyberrunner.game\"" >> export_presets.cfg
          echo "package/name=\"Cyber Runner\"" >> export_presets.cfg
          echo "package/signed=true" >> export_presets.cfg
          echo "package/app_category=0" >> export_presets.cfg
          echo "screen/immersive_mode=true" >> export_presets.cfg
          echo "screen/keep_screen_on=true" >> export_presets.cfg
          echo "version/code=1" >> export_presets.cfg
          echo "version/name=\"1.0\"" >> export_presets.cfg
          cat export_presets.cfg

      - name: Debug paths
        run: |
          echo "SDK: $ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/ndk/ 2>/dev/null || echo "NDK missing"
          ls ~/.local/share/godot/export_templates/4.2.2.stable/ | grep android || echo "no android templates"
          ls -la $HOME/debug.keystore || echo "keystore missing"

      - name: Import project
        run: |
          timeout 60 godot --headless --editor --quit 2>&1 || true
          sleep 5

      - name: Export APK
        run: |
          godot --headless --verbose --export-debug "Android" build/CyberRunner.apk 2>&1
          ls -la build/ || echo "build empty"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberRunner-APK
          path: build/CyberRunner.apk
          if-no-files-found: warn
          retention-days: 30
