name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-create .godot folder
        run: |
          mkdir -p .godot/imported
          mkdir -p .godot/editor

      - name: Export Android APK
        uses: dulvui/godot-android-export@v4
        with:
          godot-version: 4.2.2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberRunner-APK
          path: "*.apk"
          retention-days: 30
